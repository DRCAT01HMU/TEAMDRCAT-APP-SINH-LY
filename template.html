        </button>
        <button id="btn-luu-pure" onclick="toggleLuuPure(this)" class="active:scale-95 transition-all flex items-center gap-1.5 sm:gap-2 px-3 sm:px-5 hover:text-white">
            <i class="fa-solid fa-heart text-sm sm:text-lg md:text-xl"></i> Lưu
        </button>
        <button id="btn-xong-pure" onclick="toggleXongPure(this)" class="active:scale-95 transition-all flex items-center gap-1.5 sm:gap-2 pl-3 sm:pl-5 hover:text-white">
            <i class="fa-solid fa-circle-check text-sm sm:text-lg md:text-xl"></i> Đã Xong
        </button>
    </nav>
    <script>
        (function() {
            try {
                const u = window.location.pathname.split('/').pop().split('?')[0].split('#')[0];
                const b = JSON.parse(localStorage.getItem('pwa_bookmarks') || '[]');
                if(b.includes(u)) { document.write('<style>#btn-luu-pure { color: #f43f5e; font-weight: 900; filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.07)); }</style>'); }
                const c = JSON.parse(localStorage.getItem('pwa_completed') || '[]');
                if(c.includes(u)) { document.write('<style>#btn-xong-pure { color: #34d399; font-weight: 900; filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.07)); }</style>'); }
            } catch(e) {}
        })();
        function toggleLuuPure(btn) {
            try {
                const u = window.location.pathname.split('/').pop().split('?')[0].split('#')[0];
                let b = JSON.parse(localStorage.getItem('pwa_bookmarks') || '[]');
                let isGhim = false;
                if(!b.includes(u)) { b.push(u); window.customAlert('Đã ghim mốc Dấu Trang!'); isGhim = true; }
                else { b = b.filter(x => x !== u); window.customAlert('Đã hủy Dấu Trang!'); }
                localStorage.setItem('pwa_bookmarks', JSON.stringify(b));
                if (isGhim) { btn.classList.remove('hover:text-white'); btn.style.color = '#f43f5e'; btn.style.fontWeight = '900'; btn.style.filter = 'drop-shadow(0 4px 3px rgb(0 0 0 / 0.07))'; }
                else { btn.classList.add('hover:text-white'); btn.style.color = ''; btn.style.fontWeight = ''; btn.style.filter = ''; }
            } catch(e) { console.error(e); }
        }
        function toggleXongPure(btn) {
            try {
                const u = window.location.pathname.split('/').pop().split('?')[0].split('#')[0];
                let c = JSON.parse(localStorage.getItem('pwa_completed') || '[]');
                let isDone = false;
                if(!c.includes(u)) { c.push(u); window.customAlert('Đã đánh dấu bài học này là [Đã Xong]!'); isDone = true; }
                else { c = c.filter(x => x !== u); window.customAlert('Đã bỏ đánh dấu hoàn thành bài học!'); }
                localStorage.setItem('pwa_completed', JSON.stringify(c));
                if (isDone) { btn.classList.remove('hover:text-white'); btn.style.color = '#34d399'; btn.style.fontWeight = '900'; btn.style.filter = 'drop-shadow(0 4px 3px rgb(0 0 0 / 0.07))'; }
                else { btn.classList.add('hover:text-white'); btn.style.color = ''; btn.style.fontWeight = ''; btn.style.filter = ''; }
            } catch(e) { console.error(e); }
        }
    </script>


<script>
window.customConfirmDialog = function(msg, onConfirm) {
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-slate-900/80 z-[99999] flex items-center justify-center backdrop-blur-sm transition-opacity duration-300';
    overlay.style.opacity = '0';
    
    const dialog = document.createElement('div');
    dialog.className = 'bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] shadow-2xl max-w-sm w-[90%] mx-auto transform transition-all duration-300 border border-slate-200 dark:border-slate-700 scale-95 opacity-0';
    
    const iconContainer = document.createElement('div');
    iconContainer.className = 'w-16 h-16 bg-blue-100 dark:bg-blue-900/50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 dark:text-blue-400 shadow-inner';
    iconContainer.innerHTML = '<i class="fa-solid fa-circle-question text-3xl"></i>';
    
    const title = document.createElement('h3');
    title.className = 'text-xl font-black text-slate-800 dark:text-white mb-2 text-center uppercase tracking-wider';
    title.innerText = 'Xác nhận';
    
    const message = document.createElement('p');
    message.className = 'text-slate-500 dark:text-slate-400 text-center mb-8 font-medium text-sm sm:text-base';
    message.innerText = msg;
    
    const btnContainer = document.createElement('div');
    btnContainer.className = 'flex gap-3 justify-center';
    
    const btnCancel = document.createElement('button');
    btnCancel.className = 'flex-1 px-5 py-3 rounded-xl font-bold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-all active:scale-95';
    btnCancel.innerText = 'Hủy';
    btnCancel.onclick = () => {
        overlay.style.opacity = '0';
        dialog.classList.remove('scale-100', 'opacity-100');
        dialog.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { if(document.body.contains(overlay)) document.body.removeChild(overlay); }, 300);
    };
    
    const btnConfirm = document.createElement('button');
    btnConfirm.className = 'flex-1 px-5 py-3 rounded-xl font-bold bg-gradient-to-r from-blue-500 to-cyan-500 text-white hover:from-blue-600 hover:to-cyan-600 shadow-md transition-all active:scale-95 shadow-blue-500/30';
    btnConfirm.innerText = 'Đồng ý';
    btnConfirm.onclick = () => {
        overlay.style.opacity = '0';
        dialog.classList.remove('scale-100', 'opacity-100');
        dialog.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { if(document.body.contains(overlay)) document.body.removeChild(overlay); }, 300);
        if(onConfirm) onConfirm();
    };
    
    btnContainer.appendChild(btnCancel);
    btnContainer.appendChild(btnConfirm);
    
    dialog.appendChild(iconContainer);
    dialog.appendChild(title);
    dialog.appendChild(message);
    dialog.appendChild(btnContainer);
    overlay.appendChild(dialog);
    
    document.body.appendChild(overlay);
    
    requestAnimationFrame(() => {
        overlay.style.opacity = '1';
        dialog.classList.remove('scale-95', 'opacity-0');
        dialog.classList.add('scale-100', 'opacity-100');
    });
};

window.customAlert = function(msg) {
    const toast = document.createElement('div');
    toast.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-[999999] flex items-center gap-3 transform transition-all duration-500 translate-y-10 opacity-0 font-bold tracking-wide text-sm border border-slate-700';
    toast.innerHTML = `<i class="fa-solid fa-bell text-rose-400"></i> ${msg}`;
    
    document.body.appendChild(toast);
    
    requestAnimationFrame(() => {
        toast.classList.remove('translate-y-10', 'opacity-0');
    });
    
    setTimeout(() => {
        toast.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => { if(document.body.contains(toast)) document.body.removeChild(toast); }, 500);
    }, 3000);
};
</script>
